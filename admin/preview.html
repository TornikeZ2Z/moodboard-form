<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PREVIEW (read-only)</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600&family=Allura&family=Noto+Sans+Georgian:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16161c; --ink-soft:#6b6b75; --indigo:#4e44e6; --indigo-deep:#352bc0;
  --paper:#fbfbfe; --paper-2:#f4f3fb; --wash:#eceafb; --muted:#8a8a93;
  --line:#e6e6ef; --good:#3f7d52; --bad:#c94f3d;
  --arch:'Archivo','Noto Sans Georgian',system-ui,sans-serif;
  --hank:'Hanken Grotesk','Noto Sans Georgian',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--hank);font-size:14.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:var(--arch);cursor:pointer}

.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:14px clamp(16px,3vw,32px);background:rgba(251,251,254,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{font-family:var(--arch);font-weight:800;font-size:15px;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:baseline;gap:.15em}
.brand .s{font-family:'Allura',cursive;font-weight:400;font-size:24px;color:var(--indigo);text-transform:none;line-height:0;transform:translateY(.06em)}
.brand small{font-family:var(--hank);font-weight:500;color:var(--muted);font-size:10.5px;letter-spacing:.18em;margin-left:10px;text-transform:uppercase}
.tabs{display:flex;gap:6px}
.tabs button{border:1px solid var(--line);background:#fff;border-radius:30px;padding:8px 18px;font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);transition:.2s}
.tabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.userbox{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.userbox button{background:none;border:0;color:var(--indigo);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}

.wrap{max-width:1560px;margin:0 auto;padding:26px clamp(14px,3vw,40px) 120px}
.hidden{display:none!important}

/* login */
.login-wrap{min-height:82vh;display:flex;align-items:center;justify-content:center}
.login{width:min(420px,92vw);background:#fff;border:1px solid var(--line);border-radius:4px;padding:38px;box-shadow:0 20px 50px -30px rgba(22,22,40,.25)}
.login h1{font-family:var(--arch);font-weight:800;text-transform:uppercase;font-size:22px;letter-spacing:-.01em;margin:14px 0 4px}
.login p{color:var(--ink-soft);font-size:13px;margin-bottom:22px}
.login label{display:block;font-family:var(--arch);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 6px}
.login input{width:100%;border:1px solid var(--line);border-radius:2px;padding:12px;font-family:var(--hank);font-size:14px;background:var(--paper)}
.login input:focus{outline:none;border-color:var(--indigo)}
.login .err{color:var(--bad);font-size:12.5px;margin-top:12px;min-height:16px}
.btn{display:inline-flex;align-items:center;gap:10px;font-family:var(--arch);font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;background:var(--ink);color:#fff;padding:13px 24px;border-radius:2px;border:0;transition:.25s}
.btn:hover{background:var(--indigo)}
.btn.full{width:100%;justify-content:center;margin-top:20px}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{border-color:var(--indigo);color:var(--indigo);background:transparent}
.btn.danger{background:transparent;border:1px solid var(--line);color:var(--bad)}
.btn.danger:hover{background:var(--bad);border-color:var(--bad);color:#fff}
.btn.sm{padding:8px 14px;font-size:10.5px}

/* sections & questions */
.sec{background:#fff;border:1px solid var(--line);border-radius:4px;margin:16px 0;overflow:hidden}
.sec-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line);background:var(--paper-2)}
.sec-head h2{font-family:var(--arch);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;flex:1}
.sec-head .cnt{font-size:11px;color:var(--muted);letter-spacing:.08em}
.badge{font-family:var(--arch);font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:20px;background:var(--wash);color:var(--indigo-deep)}
.q-row{display:flex;align-items:center;gap:10px;padding:11px 20px;border-bottom:1px solid var(--paper-2);transition:background .15s}
.q-row:hover{background:var(--paper)}
.q-row:last-child{border-bottom:0}
.q-row.off .q-label{opacity:.38;text-decoration:line-through}
.q-move{display:flex;flex-direction:column;gap:2px}
.q-move button{border:0;background:none;color:var(--muted);font-size:10px;line-height:1;padding:2px 4px}
.q-move button:hover{color:var(--indigo)}
.q-label{flex:1;font-size:13.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip{font-size:9.5px;font-family:var(--arch);font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:3px 8px;white-space:nowrap}
.chip.dep{color:var(--indigo-deep);border-color:var(--wash);background:var(--wash)}
.iconb{border:0;background:none;font-size:15px;padding:5px 7px;border-radius:4px;color:var(--ink-soft);transition:.15s}
.iconb:hover{background:var(--wash);color:var(--indigo-deep)}
.iconb.lock{opacity:.35;cursor:not-allowed}
.sw{position:relative;width:34px;height:19px;border-radius:12px;background:#d9d9e6;border:0;transition:.2s;flex:none}
.sw::after{content:"";position:absolute;top:2.5px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s}
.sw.on{background:var(--indigo)}
.sw.on::after{left:17px}

/* editor */
.editor{background:var(--paper-2);border-top:1px solid var(--line);padding:18px 20px}
.editor .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:800px){.editor .grid3{grid-template-columns:1fr}}
.editor label{display:block;font-family:var(--arch);font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:12px 0 5px}
.editor input,.editor select{width:100%;border:1px solid var(--line);border-radius:2px;padding:9px 11px;font-family:var(--hank);font-size:13.5px;background:#fff}
.editor input:focus,.editor select:focus{outline:none;border-color:var(--indigo)}
.opt-row,.opt-head{display:grid;grid-template-columns:110px 1fr 1fr 1fr 170px 34px;gap:10px;align-items:center;margin-bottom:8px}
.opt-head{margin:14px 0 4px}
.opt-head span{font-family:var(--arch);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
@media(max-width:900px){.opt-row{grid-template-columns:1fr 1fr;}}
.opt-row .del{border:0;background:none;color:var(--bad);font-size:15px}
.editor .row-actions{display:flex;gap:10px;margin-top:18px;align-items:center}
.dep-grid{display:grid;grid-template-columns:1fr 120px 1fr;gap:8px}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px}

/* submissions */
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden}
th{font-family:var(--arch);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--paper-2)}
td{padding:12px 14px;border-bottom:1px solid var(--paper-2);font-size:13px}
tr:hover td{background:var(--paper)}
td .mini{color:var(--muted);font-size:11.5px}
.pillbtn{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 14px;font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
.pillbtn:hover{border-color:var(--indigo);color:var(--indigo)}

/* detail overlay */
.overlay{position:fixed;inset:0;background:rgba(16,16,24,.55);backdrop-filter:blur(4px);z-index:80;display:flex;justify-content:flex-end}
.panel{width:min(720px,96vw);height:100%;background:var(--paper);overflow-y:auto;padding:28px clamp(16px,3vw,36px);box-shadow:-30px 0 60px -30px rgba(0,0,0,.4)}
.panel h2{font-family:var(--arch);text-transform:uppercase;font-size:20px;font-weight:800;letter-spacing:-.01em}
.panel .meta{color:var(--muted);font-size:12px;margin:6px 0 18px}
.ans-sec{margin:20px 0 8px;font-family:var(--arch);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo-deep);border-bottom:1px solid var(--line);padding-bottom:6px}
.ans-row{display:flex;justify-content:space-between;gap:16px;padding:7px 0;border-bottom:1px dashed var(--paper-2);font-size:13px}
.ans-row .k{color:var(--ink-soft);max-width:55%}
.ans-row .v{text-align:right;font-weight:600}
.mb-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.mb-mini .cell{border-radius:3px;overflow:hidden;position:relative;aspect-ratio:4/3;background:var(--paper-2)}
.mb-mini .cell.wide{grid-column:span 2}
.mb-mini img{width:100%;height:100%;object-fit:cover}
.mb-mini .tag{position:absolute;left:0;right:0;bottom:0;font-family:var(--arch);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:linear-gradient(transparent,rgba(22,22,40,.8));padding:10px 6px 4px}
.mb-mini .chips{display:flex;height:100%}
.mb-mini .chips i{flex:1}

/* questionnaire builder v2 */
.qb-layout{display:grid;grid-template-columns:270px 1fr;gap:24px;align-items:start}
@media(max-width:980px){.qb-layout{grid-template-columns:1fr}.qb-side{display:none}}
.qb-side{position:sticky;top:74px;background:#fff;border:1px solid var(--line);border-radius:4px;padding:8px;max-height:calc(100vh - 100px);overflow:auto}
.qb-nav{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;border-radius:3px;padding:10px 10px;cursor:pointer;font-family:var(--hank);font-size:13.5px;color:var(--ink-soft);transition:.15s}
.qb-nav:hover{background:var(--wash);color:var(--indigo-deep)}
.qb-nav i{font-style:normal;font-family:var(--arch);font-size:10px;font-weight:700;color:var(--muted);width:20px}
.qb-nav span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.qb-nav em{font-style:normal;font-size:11px;color:var(--muted)}
.qb-nav.off span{text-decoration:line-through;opacity:.5}
.qb-search{border:1px solid var(--line);border-radius:30px;padding:11px 18px;font-family:var(--hank);font-size:14px;width:min(340px,40vw);background:#fff}
.qb-search:focus{outline:none;border-color:var(--indigo)}
.sec-num{font-family:var(--arch);font-size:11px;font-weight:800;color:var(--indigo);border:1.5px solid var(--wash);background:var(--wash);border-radius:20px;padding:4px 10px}
.tpl-note{padding:10px 20px;background:var(--wash);color:var(--indigo-deep);font-size:13px;border-bottom:1px solid var(--line)}
.swlab{display:inline-flex;align-items:center;gap:8px;font-family:var(--arch);font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.q-num{font-family:var(--arch);font-size:10.5px;font-weight:700;color:var(--muted);width:22px}
.q-row{padding:13px 20px;gap:12px}
.q-label b{display:block;font-weight:600;font-size:15px;line-height:1.3}
.q-label small{display:block;color:var(--muted);font-size:12.5px;margin-top:1px}
.q-row.off .q-label b,.q-row.off .q-label small{opacity:.4;text-decoration:none}
.chip.offchip{background:#f6e3e0;border-color:#f6e3e0;color:var(--bad)}
.editb{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 14px;font-family:var(--arch);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;transition:.15s;white-space:nowrap}
.editb:hover{border-color:var(--indigo);color:var(--indigo)}
.ed-block{background:#fff;border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:14px}
.ed-block h4{font-family:var(--arch);font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--indigo-deep);margin-bottom:10px}
.opt-row,.opt-head{grid-template-columns:52px 110px 1fr 1fr 1fr 170px 34px}
.opt-thumb{width:48px;height:36px;object-fit:cover;border-radius:3px;border:1px solid var(--line)}
.opt-thumb.none{display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;background:var(--paper-2)}
.dep-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:14px}
@media(max-width:900px){.dep-grid{grid-template-columns:1fr}}
.depvals{display:flex;flex-wrap:wrap;gap:8px;padding-top:2px}
.depval{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:20px;padding:8px 14px;font-size:13.5px;cursor:pointer;background:#fff;transition:.15s}
.depval.on{border-color:var(--indigo);background:var(--wash);color:var(--indigo-deep);font-weight:600}
.depval input{accent-color:var(--indigo)}
.dep-live{margin-top:10px;color:var(--indigo-deep)}
.wrap.wide{max-width:1560px}

/* submission detail page */
tbody tr{cursor:pointer}
.subd-head{background:#fff;border:1px solid var(--line);border-radius:4px;padding:22px 26px;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.subd-head h1{font-family:var(--arch);font-weight:800;text-transform:uppercase;font-size:24px;letter-spacing:-.01em}
.subd-head .meta{color:var(--ink-soft);font-size:14px;margin-top:4px}
.subd-cols{column-count:2;column-gap:22px}
@media(max-width:1100px){.subd-cols{column-count:1}}
.subd-sec{background:#fff;border:1px solid var(--line);border-radius:4px;padding:18px 22px;margin-bottom:22px;break-inside:avoid}
.subd-sec h2{font-family:var(--arch);font-size:12.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--indigo-deep);border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:6px}
.subd-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:8px 0;border-bottom:1px dashed var(--paper-2);font-size:14.5px}
.subd-row:last-child{border-bottom:0}
.subd-row .k{color:var(--ink-soft);max-width:52%}
.subd-row .v{text-align:right;font-weight:600;display:flex;align-items:center;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.subd-row .v img{width:44px;height:33px;object-fit:cover;border-radius:3px;border:1px solid var(--line)}
.subd-row .pal{display:inline-flex;height:18px;width:70px;border-radius:3px;overflow:hidden;border:1px solid var(--line)}
.subd-row .pal i{flex:1}
.backlink{display:inline-flex;align-items:center;gap:8px;font-family:var(--arch);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:16px;cursor:pointer;background:none;border:0}
.backlink:hover{color:var(--indigo)}

/* savebar */
.savebar{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(251,251,254,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px clamp(16px,3vw,32px);display:flex;align-items:center;justify-content:space-between;gap:14px}
.savebar .state{font-size:12px;color:var(--muted)}
.savebar .state.dirty{color:var(--bad);font-weight:600}
.savebar .state.saved{color:var(--good);font-weight:600}
.toolrow{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:6px 0 18px;flex-wrap:wrap}
.toolrow h1{font-family:var(--arch);text-transform:uppercase;font-weight:800;font-size:clamp(20px,3vw,28px);letter-spacing:-.01em}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--wash);border-top-color:var(--indigo);border-radius:50%;animation:sp 1s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.dropzone{display:block;border:2px dashed var(--line-2);border-radius:4px;padding:22px;text-align:center;cursor:pointer;margin-top:14px;transition:.2s;background:#fff}
.dropzone b{display:block;font-family:var(--arch);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--indigo-deep)}
.dropzone span{display:block;font-size:12px;color:var(--muted);margin-top:5px}
.dropzone.over,.dropzone:hover{border-color:var(--indigo);background:var(--wash)}
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);background:var(--ink);color:#fff;font-family:var(--arch);font-size:12px;letter-spacing:.06em;padding:12px 22px;border-radius:30px;opacity:0;pointer-events:none;transition:.3s;z-index:200}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast.bad{background:var(--bad)}

/* ---------- readability bump ---------- */
body{font-size:16px}
.tabs button{font-size:13px;padding:10px 22px}
.userbox{font-size:13.5px}
.sec-head h2{font-size:17px}
.sec-head .cnt{font-size:12.5px}
.badge{font-size:10.5px}
.q-label{font-size:15.5px}
.chip{font-size:10.5px;padding:4px 10px}
.q-move button{font-size:12px}
.iconb{font-size:17px}
.editor label{font-size:11px}
.editor input,.editor select{font-size:15px;padding:11px 13px}
.editor textarea{font-size:15px!important}
.hint{font-size:13px}
.btn{font-size:12.5px;padding:14px 26px}
.btn.sm{font-size:11.5px;padding:10px 17px}
.pillbtn{font-size:11.5px;padding:8px 16px}
th{font-size:11px}
td{font-size:14.5px;padding:14px 16px}
td .mini{font-size:12.5px}
.login h1{font-size:24px}
.login p{font-size:14px}
.login input{font-size:15.5px;padding:13px}
.login label{font-size:11px}
.ans-row{font-size:14.5px}
.ans-sec{font-size:12px}
.panel h2{font-size:22px}
.panel .meta{font-size:13px}
.dropzone b{font-size:13px}
.dropzone span{font-size:13px}
.savebar .state{font-size:13px}
#toast{font-size:13px}
.toolrow h1{font-size:clamp(22px,3vw,30px)}
</style>
</head>
<body>
<header class="topbar">
  <a class="brand" href="../">ESPACIO<span class="s">Studio</span><small>Admin</small></a>
  <div class="tabs hidden" id="tabs">
    <button data-view="questions" class="on">Questionnaire</button>
    <button data-view="submissions">Submissions</button>
    <button data-view="projects">Projects</button>
  </div>
  <div class="userbox hidden" id="userbox"><span id="userEmail"></span><button id="btnLogout">Log out</button></div>
</header>
<main id="main"></main>
<div class="savebar hidden" id="savebar">
  <div class="state" id="saveState"></div>
  <div style="display:flex;gap:10px">
    <button class="btn ghost" id="btnDiscard">Discard changes</button>
    <button class="btn" id="btnSave">Publish changes</button>
  </div>
</div>
<script src="../questionnaire/config.js?v=6"></script>
<script>
/* PREVIEW MODE — read-only, fake session, no writes possible */
sessionStorage.setItem('esp_admin_session', JSON.stringify({token:'PREVIEW', email:'preview — read-only', exp: Date.now()+86400000}));
window.__PREVIEW__ = true;
window.addEventListener('DOMContentLoaded',()=>{const b=document.createElement('div');b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999;background:#c94f3d;color:#fff;text-align:center;font:11px Archivo,sans-serif;letter-spacing:2px;padding:3px';b.textContent='PREVIEW — READ ONLY';document.body.appendChild(b);});
const _fetch = window.fetch.bind(window);
window.fetch = (url, opt={}) => {
  const u = String(url); const m = (opt.method||'GET').toUpperCase();
  if (u.includes('/rest/v1/submissions')) {
    if (m === 'GET') return _fetch(u.replace(/^.*\/rest\//, CONFIG.SUPABASE_URL+'/rest/'), {headers:{apikey: CONFIG.SUPABASE_KEY}}).catch(()=>new Response('[]',{status:200}));
    return Promise.resolve(new Response('preview: read-only', {status:403}));
  }
  if (u.includes('form_schema')) {
    if (m !== 'GET') return Promise.resolve(new Response('preview: read-only', {status:403}));
    return _fetch(u, {headers:{apikey: CONFIG.SUPABASE_KEY}});
  }
  if (u.includes('/storage/') || u.includes('/auth/')) return Promise.resolve(new Response('preview: read-only', {status:403}));
  return _fetch(url, opt);
};
