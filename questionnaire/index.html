<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Questionnaire — Espacio Studio</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"><link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Hanken+Grotesk:wght@300;400;500;600&family=Allura&family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=12">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="app">
  <header class="topbar">
    <a class="brand" href="../">ESPACIO<span class="s">Studio</span><small id="brandSub"></small><span id="brandName" hidden></span></a>
    <div class="lang-switch" id="langSwitch">
      <button data-lang="ge">ქარ</button>
      <button data-lang="en">EN</button>
      <button data-lang="ru">РУ</button>
    </div>
  </header>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-steps" id="progressSteps"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <main id="stage"></main>

  <footer class="navbar" id="navbar">
    <button class="btn ghost" id="btnBack"></button>
    <div class="nav-hint" id="navHint"></div>
    <button class="btn primary" id="btnNext"></button>
  </footer>
</div>

<div class="lightbox" id="lightbox" hidden>
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-prev" id="lbPrev">&#8249;</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" id="lbNext">&#8250;</button>
  <div class="lb-caption" id="lbCaption"></div>
</div>

<script src="config.js?v=8"></script>
<script src="i18n.js?v=8"></script>
<script src="app.js?v=13"></script>
</body>
</html>
