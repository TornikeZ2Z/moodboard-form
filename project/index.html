    <div class="inner"><div class="eyebrow"><i></i>${LP().eyebrow}</div>
    <h1>${P.name}</h1><div class="meta">${tags}</div></div></section>
  <section class="body">
    <p class="lede">${P.description||""}</p>
    <div class="gallery">${P.gallery.map((g,k)=>`<figure class="ph" data-k="${k}"><img src="${norm(g)}" loading="lazy" alt="${P.name} ${k+1}"></figure>`).join("")}</div>
  </section>
  <nav class="pn">
    <a href="?p=${prev.slug}"><small>${LP().prev}</small>${prev.name}</a>
    <a class="next" href="?p=${next.slug}"><small>${LP().next}</small>${next.name}</a>
  </nav>
  <section class="ctaband"><h2>${LP().ready}</h2>
    <a class="btn" href="../questionnaire/">${LP().fill}</a></section>
  <footer><span>© <span id="yr"></span> Espacio Studio — Tbilisi</span><a href="mailto:info@espacio.ge">info@espacio.ge</a></footer>`;
  document.getElementById("yr").textContent=new Date().getFullYear();
  document.querySelectorAll(".ph").forEach(f=>f.onclick=()=>{gi=+f.dataset.k;openLb();});
}
const lb=document.getElementById("lb");
function openLb(){lb.classList.add("open");document.body.style.overflow="hidden";draw();}
function draw(){document.getElementById("lbI").src=norm(P.gallery[gi]);document.getElementById("lbC").textContent=`${P.name} — ${gi+1} / ${P.gallery.length}`;}
document.getElementById("lbX").onclick=()=>{lb.classList.remove("open");document.body.style.overflow="";};
document.getElementById("lbP").onclick=()=>{gi=(gi-1+P.gallery.length)%P.gallery.length;draw();};
document.getElementById("lbN").onclick=()=>{gi=(gi+1)%P.gallery.length;draw();};
lb.onclick=e=>{if(e.target===lb)document.getElementById("lbX").onclick();};
addEventListener("keydown",e=>{if(!lb.classList.contains("open"))return;
 if(e.key==="Escape")document.getElementById("lbX").onclick();
 if(e.key==="ArrowLeft")document.getElementById("lbP").onclick();
 if(e.key==="ArrowRight")document.getElementById("lbN").onclick();});
function applyChrome(){
  document.documentElement.lang = espLang === "ge" ? "ka" : espLang;
  document.getElementById("lBack").textContent = LP().back;
  document.getElementById("lCta").textContent = LP().cta;
  document.querySelectorAll("#langPick button").forEach(b=>b.classList.toggle("on", b.dataset.lang===espLang));
}
document.querySelectorAll("#langPick button").forEach(b=>b.onclick=()=>{
  espLang=b.dataset.lang; localStorage.setItem("espacio_lang",espLang); applyChrome(); render(); });
applyChrome();
load();
</script>
</body>
</html>
